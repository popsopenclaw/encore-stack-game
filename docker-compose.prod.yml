services:
  postgres:
    ports: []
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set in .env}
      POSTGRES_USER: ${POSTGRES_USER:?set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}

  valkey:
    ports: []

  backend:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?set in .env}
      GitHubOAuth__ClientId: ${GITHUB_CLIENT_ID:?set in .env}
      GitHubOAuth__ClientSecret: ${GITHUB_CLIENT_SECRET:?set in .env}
      GitHubOAuth__RedirectUri: ${GITHUB_REDIRECT_URI:?set in .env}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
