name: deploy-vm

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main
      mode:
        description: Deployment mode
        required: false
        default: prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Write SSH key
        run: |
          install -m 700 -d ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Write env file
        run: |
          cat > .env << 'EOF'
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          JWT_ISSUER=${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
          JWT_SIGNING_KEY=${{ secrets.JWT_SIGNING_KEY }}
          GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}
          GITHUB_REDIRECT_URI=${{ secrets.GITHUB_REDIRECT_URI }}
          ASPNETCORE_ENVIRONMENT=Production
          BACKEND_PORT=${{ secrets.BACKEND_PORT }}
          EOF

      - name: Deploy
        env:
          SSH_KEY: ~/.ssh/id_ed25519
          SSH_PORT: ${{ secrets.VM_SSH_PORT }}
          ENV_FILE: .env
          DEPLOY_MODE: ${{ github.event.inputs.mode }}
        run: |
          ./scripts/deploy-vm.sh "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_HOST }}" /opt/encore-stack-game "${{ github.event.inputs.ref }}"
