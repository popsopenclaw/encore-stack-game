name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend solution
        run: dotnet restore backend/Encore.sln

      - name: Build backend solution
        run: dotnet build backend/Encore.sln --configuration Release --no-restore

      - name: Run backend unit + integration tests
        run: dotnet test backend/Encore.sln --configuration Release --no-build --verbosity normal

  regression-checks:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: frontend
        run: flutter pub get

      - name: Frontend regression (static analysis)
        working-directory: frontend
        run: flutter analyze

      - name: Compose regression (config validity)
        run: docker compose config
